<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cristina Libre · Fixture y Posiciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@600;700;900&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase (modo en vivo, opcional). Si no hay internet o no está configurado, la app sigue funcionando local. -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --bg:#06060f;
    --bg-card:#0d0d1e;
    --bg-card-2:#111128;
    --bg-card-3:#141430;
    --chalk:#e8e8f0;
    --chalk-dim:rgba(200,200,240,.55);
    --chalk-faint:#3a3a5a;
    --volt:#c8ff00;
    --volt-dim:#8aaa00;
    --blue:#1e6fff;
    --blue-dim:#0a3a9a;
    --coral:#ff4d6a;
    --zone-a:#c8ff00;
    --zone-b:#1e6fff;
    --gold:#ffc23d;
    --gold-dim:#a87f2a;
    --line:rgba(255,255,255,.05);
    --line-strong:rgba(255,255,255,.1);
    --ink:#03030a;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--chalk);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ─── Dot grid background ─── */
  .stripes{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:radial-gradient(rgba(200,255,0,.04) 1px, transparent 1px);
    background-size:18px 18px;
  }
  .stripes::before{
    content:""; position:fixed; top:0; left:0; right:0; height:300px;
    background:radial-gradient(ellipse at 30% top, rgba(30,111,255,.08), transparent 70%);
  }
  .app{ position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

  /* ─── Horizontal sticky tab rail ─── */
  .railwrap{
    position:sticky; top:0; z-index:10;
    background:rgba(6,6,15,.96);
    backdrop-filter:blur(8px);
    display:flex; flex-direction:row;
    border-bottom:1px solid var(--line-strong);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .railwrap::-webkit-scrollbar{ display:none; }
  .tab{
    writing-mode:horizontal-tb; transform:none;
    font-family:'Oswald',sans-serif; font-weight:500;
    font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--chalk-faint);
    background:none; border:none; cursor:pointer;
    padding:12px 16px; white-space:nowrap; flex:0 0 auto;
    border-bottom:2px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab.active{ color:var(--volt); border-bottom-color:var(--volt); }
  .tab:hover:not(.active){ color:var(--chalk); }
  .tab .arrow{ display:none; }

  main{ flex:1; padding:0 16px 60px; max-width:900px; width:100%; }

  /* ─── Banner ─── */
  header.top{ border-bottom:1px solid var(--line-strong); margin-bottom:20px; }
  .banner-img{ width:100%; height:auto; display:block; }
  .sub-bar{
    display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px; padding:10px 0 14px;
  }
  header.top .sub{ font-size:12px; color:var(--chalk-dim); letter-spacing:.04em; }

  /* ─── Headstats ─── */
  .headstats{ display:flex; gap:20px; font-family:'IBM Plex Mono',monospace; }
  .headstats div{ text-align:right; }
  .headstats .n{
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:22px; color:var(--volt); display:block; line-height:1;
    text-shadow:0 0 14px rgba(200,255,0,.3);
  }
  .headstats .l{ font-size:9px; color:var(--chalk-faint); letter-spacing:.08em; text-transform:uppercase; }

  /* ─── Section titles ─── */
  h2.sectiontitle{
    font-family:'Oswald',sans-serif; font-weight:600; font-size:16px;
    letter-spacing:.06em; text-transform:uppercase; color:var(--chalk);
    margin:0 0 14px; display:flex; align-items:center; gap:10px;
  }
  h2.sectiontitle::before{
    content:""; width:3px; height:18px; background:var(--volt); flex:0 0 auto;
  }
  h2.sectiontitle .tag{
    font-size:10px; font-family:'IBM Plex Mono',monospace;
    background:rgba(200,255,0,.08); color:var(--volt);
    padding:3px 8px; letter-spacing:0; font-weight:500; text-transform:none;
  }

  /* ─── Zone picker ─── */
  .zonepicker{ display:flex; gap:0; margin-bottom:18px; }
  .zonebtn{
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    padding:8px 20px; cursor:pointer;
    border:1px solid var(--line-strong); background:transparent;
    color:var(--chalk-faint); transition:all .15s ease;
  }
  .zonebtn.zoneA.active{ background:var(--volt); color:var(--ink); border-color:var(--volt); }
  .zonebtn.zoneB.active{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .zonebtn:hover:not(.active){ border-color:var(--chalk-faint); color:var(--chalk); }

  /* ─── Match cards ─── */
  .match-card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px 10px;
    margin-bottom:10px;
  }
  .match-card.played{ border-color:rgba(200,255,0,.12); }
  .match-card.special{ opacity:.65; }

  .match-main{
    display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:10px; margin-bottom:10px;
  }
  .teamname{ color:var(--chalk); font-size:14px; font-weight:600; line-height:1.2; }
  .teamname.left{ text-align:left; }
  .teamname:not(.left){ text-align:right; }
  .teamname.ret{ color:var(--chalk-faint); text-decoration:line-through; }

  .score-block{ display:flex; align-items:center; gap:6px; justify-content:center; }

  /* Score como texto grande en modo solo lectura */
  .score-display{
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:32px; color:var(--volt); line-height:1; letter-spacing:.02em;
    min-width:28px; text-align:center;
    text-shadow:0 0 12px rgba(200,255,0,.3);
  }
  .score-display.anulado{ font-size:12px; color:var(--chalk-faint); font-weight:600; }
  .score-display.wo{ font-size:14px; color:var(--coral); font-weight:700; }
  .score-vs{
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:16px; color:rgba(200,255,0,.25); letter-spacing:.06em;
  }

  .scorebox{
    width:46px; text-align:center;
    background:rgba(200,255,0,.07); border:1px solid rgba(200,255,0,.2);
    color:var(--volt);
    font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:700;
    border-radius:5px; padding:4px 0; line-height:1;
  }
  .scorebox:disabled{ opacity:.2; background:transparent; border-color:var(--line); color:var(--chalk-faint); }
  .scorebox:focus{ outline:none; box-shadow:0 0 0 2px rgba(200,255,0,.35); }
  .dash{ color:var(--chalk-faint); font-family:'IBM Plex Mono',monospace; font-size:16px; }

  /* ── Fecha y hora grandes ── */
  .match-when-row{
    display:flex; align-items:center; gap:10px;
    flex-wrap:wrap; margin-bottom:8px;
  }

  /* Vista solo lectura: fecha y hora en grande */
  .match-date{
    font-family:'Oswald',sans-serif; font-weight:600;
    font-size:15px; color:var(--ink); letter-spacing:.02em;
    background:var(--chalk); padding:3px 12px; border-radius:4px;
  }
  .match-time{
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:20px; color:var(--volt); letter-spacing:.04em;
    background:rgba(200,255,0,.08); border:1px solid rgba(200,255,0,.2);
    padding:2px 12px; border-radius:4px;
    text-shadow:0 0 10px rgba(200,255,0,.3);
  }

  /* Vista editor: inputs de fecha/hora */
  .match-edit-when{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .sched-date{
    background:var(--bg-card-2); border:1px solid var(--line-strong);
    color:var(--chalk); border-radius:5px; padding:7px 10px;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:500;
    min-width:0; width:160px;
  }
  .sched-time{
    background:var(--bg-card-2); border:1px solid var(--line-strong);
    color:var(--volt); border-radius:5px; padding:7px 10px;
    font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700;
    width:90px; letter-spacing:.04em;
  }
  .sched-date:focus, .sched-time:focus{
    outline:none; border-color:var(--volt);
  }
  .match-date-preview{
    font-size:12px; color:var(--chalk-faint);
    font-family:'IBM Plex Mono',monospace;
  }

  .match-status-row{
    display:flex; justify-content:flex-end;
  }
  .status{
    font-family:'IBM Plex Mono',monospace; font-size:10px;
    letter-spacing:.06em; text-transform:uppercase;
  }
  .status.pend{ color:var(--chalk-faint); }
  .status.ok{ color:var(--volt); }
  .status.wo{ color:var(--coral); }

  /* ─── BYE banner (equipo libre en la fecha) ─── */
  .bye-banner{
    display:flex; align-items:center; gap:8px;
    background:rgba(200,255,0,.05); border:1px solid rgba(200,255,0,.15);
    border-radius:6px; padding:8px 14px; margin-bottom:10px;
  }
  .bye-icon{ font-size:14px; }
  .bye-text{ font-size:12px; color:var(--chalk-faint); font-family:'IBM Plex Mono',monospace; }
  .bye-team{
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:16px; color:var(--volt); letter-spacing:.04em; text-transform:uppercase;
  }

  /* ─── Jornada header ─── */
  .jornada{ margin-bottom:24px; }
  .jornada-head{
    display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px;
    border-bottom:1px solid rgba(200,255,0,.2); padding-bottom:7px; margin-bottom:6px;
  }
  .jornada-head h3{
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:15px; color:var(--volt); letter-spacing:.1em; text-transform:uppercase; margin:0;
  }
  .jornada-controls{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .jornada-controls input[type=date], .jornada-controls input[type=time]{
    background:var(--bg-card-2); border:1px solid var(--line-strong); color:var(--chalk);
    font-family:'IBM Plex Mono',monospace; font-size:11px; border-radius:4px; padding:5px 6px;
  }
  button.action.small{ padding:6px 10px; font-size:10px; }

  .schedrow{
    display:flex; justify-content:flex-end; gap:8px; padding:0 4px 10px; margin-top:-2px;
  }
  .schedrow input[type=date], .schedrow input[type=time]{
    background:transparent; border:1px solid var(--line); color:var(--chalk-faint);
    font-family:'IBM Plex Mono',monospace; font-size:10px; border-radius:4px; padding:3px 5px;
  }
  .schedrow input:hover,.schedrow input:focus{ color:var(--chalk); border-color:var(--line-strong); }

  .matchrow{
    display:grid; grid-template-columns:1fr 44px auto 44px 1fr 76px;
    align-items:center; gap:6px; padding:10px 4px;
    border-bottom:1px solid var(--line);
  }
  .matchrow:last-child{ border-bottom:none; }
  .teamname{ text-align:right; color:var(--chalk); font-size:13px; font-weight:500; }
  .teamname.left{ text-align:left; }
  .teamname.ret{ color:var(--chalk-faint); text-decoration:line-through; }

  .scorebox{
    width:44px; text-align:center;
    background:rgba(200,255,0,.06); border:1px solid rgba(200,255,0,.18);
    color:var(--volt);
    font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700;
    border-radius:4px; padding:3px 0; line-height:1;
  }
  .scorebox:disabled{ opacity:.25; background:transparent; border-color:var(--line); color:var(--chalk-faint); }
  .scorebox:focus{ outline:none; box-shadow:0 0 0 2px rgba(200,255,0,.3); }
  .dash{ color:var(--chalk-faint); font-family:'IBM Plex Mono',monospace; font-size:13px; }

  .status{
    font-family:'IBM Plex Mono',monospace; font-size:9.5px;
    text-align:right; letter-spacing:.04em; text-transform:uppercase;
  }
  .status.pend{ color:var(--chalk-faint); }
  .status.ok{ color:var(--volt); }
  .status.wo{ color:var(--coral); }
  .status.null{ color:var(--chalk-faint); font-style:italic; }

  /* ─── Standings table ─── */
  table.standings{ width:100%; border-collapse:collapse; font-size:13px; margin-bottom:10px; }
  table.standings th{
    font-family:'Oswald',sans-serif; font-weight:500; font-size:10px;
    letter-spacing:.08em; text-transform:uppercase; color:var(--chalk-faint);
    text-align:center; padding:8px 6px; border-bottom:1px solid var(--line-strong);
  }
  table.standings th:first-child, table.standings td:first-child{ text-align:left; }
  table.standings td{
    font-family:'IBM Plex Mono',monospace; text-align:center;
    padding:9px 6px; border-bottom:1px solid var(--line); color:var(--chalk);
  }
  table.standings td.teamcell{ font-family:'Inter',sans-serif; text-align:left; font-size:13px; }
  table.standings td.pts{
    font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700;
    color:var(--volt);
  }
  table.standings tr.qual td{
    background:rgba(30,111,255,.06);
  }
  table.standings tr.qual td.teamcell{
    border-left:2px solid var(--blue); padding-left:8px;
  }
  table.standings tr.champion td.teamcell{ color:var(--gold); font-weight:700; }
  table.standings .pos{ color:var(--chalk-faint); width:22px; }
  .retbadge{
    font-size:9px; color:var(--coral); border:1px solid var(--coral);
    border-radius:3px; padding:1px 4px; margin-left:6px;
  }

  /* ─── Cards ─── */
  .card{
    background:var(--bg-card); border:1px solid var(--line);
    border-radius:var(--radius); padding:18px 16px; margin-bottom:20px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
  }

  /* ─── Teams list ─── */
  .teamlist{ display:grid; grid-template-columns:1fr 1fr; gap:0 24px; }
  @media(max-width:600px){ .teamlist{ grid-template-columns:1fr; } }
  .teamitem{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid var(--line); font-size:13.5px;
  }
  .teamitem .nm{ display:flex; align-items:center; gap:8px; }
  .zonedot{ width:6px; height:6px; border-radius:50%; flex:0 0 auto; }
  .zonedot.A{ background:var(--volt); }
  .zonedot.B{ background:var(--blue); }
  .switch{ position:relative; width:38px; height:20px; flex:0 0 auto; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{
    position:absolute; cursor:pointer; inset:0;
    background:var(--bg-card-3); border:1px solid var(--line-strong);
    border-radius:20px; transition:.15s;
  }
  .slider::before{
    content:""; position:absolute; width:14px; height:14px;
    left:2px; top:2px; background:var(--chalk-faint);
    border-radius:50%; transition:.15s;
  }
  .switch input:checked + .slider{ background:var(--coral); border-color:var(--coral); }
  .switch input:checked + .slider::before{ transform:translateX(17px); background:#fff; }

  /* ─── Buttons ─── */
  button.action{
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    background:var(--volt); color:var(--ink);
    border:none; padding:10px 20px; cursor:pointer; transition:filter .15s ease;
    border-radius:3px;
  }
  button.action:hover{ filter:brightness(1.1); }
  button.action.ghost{
    background:transparent; color:var(--chalk-dim);
    border:1px solid var(--line-strong); border-radius:3px;
  }
  button.action.ghost:hover{ color:var(--chalk); border-color:var(--chalk-dim); }
  button.action.danger{ background:var(--coral); color:#fff; }

  /* ─── Reglamento ─── */
  .reglas{ columns:2; column-gap:28px; font-size:13px; line-height:1.6; color:var(--chalk-dim); }
  @media(max-width:600px){ .reglas{ columns:1; } }
  .reglas h4{
    font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--volt); margin:0 0 4px;
  }
  .reglas p{ margin:0 0 14px; }

  .empty{ text-align:center; padding:50px 20px; color:var(--chalk-dim); }
  .empty p{ max-width:400px; margin:10px auto 22px; font-size:14px; }

  footer.note{
    font-size:11px; color:var(--chalk-faint); margin-top:28px;
    border-top:1px solid var(--line); padding-top:14px; line-height:1.6;
  }

  /* ─── Lockbadge ─── */
  .lockbadge{
    display:inline-block; margin-left:8px; font-size:10px; letter-spacing:.05em;
    text-transform:uppercase; color:var(--coral); border:1px solid var(--coral);
    border-radius:3px; padding:2px 6px; font-family:'IBM Plex Mono',monospace;
  }
  .lockbadge.live{ color:var(--volt); border-color:var(--volt); }

  /* ─── Image modal ─── */
  .imgmodal{
    position:fixed; inset:0; background:rgba(3,3,10,.9); z-index:50;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .imgmodal-card{
    background:var(--bg-card); border:1px solid var(--line-strong); border-radius:12px;
    padding:16px; max-width:480px; width:100%; max-height:90vh; overflow:auto;
    display:flex; flex-direction:column; gap:14px; align-items:center;
  }
  .imgmodal-card img{ width:100%; border-radius:6px; border:1px solid var(--line); }
  .imgmodal-actions{ display:flex; gap:10px; width:100%; }
  .imgmodal-actions button{ flex:1; }
  .imgmodal-hint{ font-size:11px; color:var(--chalk-faint); text-align:center; margin:0; }

  /* ─── Format switcher (Fase Final) ─── */
  .formatswitch{ display:flex; gap:6px; margin-bottom:16px; }
  .fmtbtn{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:.06em; text-transform:uppercase; padding:7px 16px;
    border:1px solid var(--line-strong); background:transparent;
    color:var(--chalk-faint); cursor:pointer; transition:all .15s ease; border-radius:3px;
  }
  .fmtbtn.active{ background:var(--volt); color:var(--ink); border-color:var(--volt); }
  .fmtbtn:hover:not(.active){ border-color:var(--chalk-dim); color:var(--chalk); }

  /* ─── Feeder graphic ─── */
  .feeder{ display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .feeder-col{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; flex:1; min-width:180px; }
  .feeder-label{ font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
  .feeder-label.za{ color:var(--volt); }
  .feeder-label.zb{ color:var(--blue); }
  .feeder-seed{ font-size:13px; padding:4px 0; display:flex; gap:8px; color:var(--chalk); }
  .feeder-pos{ color:var(--chalk-faint); font-family:'IBM Plex Mono',monospace; width:20px; flex:0 0 auto; }
  .feeder-arrow{ font-size:24px; color:var(--volt); flex:0 0 auto; }
  .feeder-center{
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:13px;
    text-align:center; color:var(--volt); letter-spacing:.08em; text-transform:uppercase;
    background:rgba(200,255,0,.05); border:1px solid rgba(200,255,0,.2);
    padding:14px 10px; flex:0 0 120px; border-radius:4px;
  }
  .feeder-center span{ font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--chalk-faint); text-transform:none; }

  /* ─── Bracket (llave de eliminación) ─── */
  .bracket{ display:flex; align-items:stretch; gap:0; overflow-x:auto; padding:4px 2px 20px; }
  .bracket-col{
    display:flex; flex-direction:column; min-width:180px; flex:0 0 auto;
    position:relative;
  }
  .bracket-col + .bracket-col{ margin-left:24px; }
  .bracket-col-title{
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--volt); text-align:center; margin-bottom:10px;
  }
  .bracket-third-title{ margin-top:28px; }
  .bracket-col.r1{ justify-content:space-between; gap:16px; }
  .bracket-col.sf{ justify-content:space-around; }
  .bracket-col.fcol{ justify-content:center; }

  .bm{
    background:var(--bg-card); border:1px solid var(--line-strong);
    border-radius:6px; padding:8px 10px; position:relative; margin-bottom:12px;
  }
  .bracket-col.fcol .bm{ margin-bottom:0; }
  .bm.decided{ border-color:rgba(200,255,0,.3); }
  .bm-row{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding:4px 0; font-size:12.5px; }
  .bm-row.win .bm-team{ color:var(--volt); font-weight:700; }
  .bm-team{ color:var(--chalk); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bm-score{
    width:32px; text-align:center; background:rgba(200,255,0,.06);
    border:1px solid rgba(200,255,0,.15); color:var(--volt);
    font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700;
    border-radius:3px; padding:2px 0; flex:0 0 auto;
  }
  .bm-score:disabled{ opacity:.3; }
  .bm-score:focus{ outline:none; box-shadow:0 0 0 2px rgba(200,255,0,.3); }
  .bm-penal{
    width:100%; margin-top:6px; background:var(--bg-card-2);
    border:1px solid var(--line-strong); color:var(--chalk-dim);
    font-size:11px; border-radius:3px; padding:4px;
  }
  .bm-penalnote{ font-size:10px; color:var(--coral); margin-top:4px; }

  /* Connector lines between bracket rounds */
  .bracket-connector{
    width:24px; flex:0 0 24px; display:flex; flex-direction:column;
    justify-content:space-around; align-self:stretch; padding:20px 0;
  }
  .bracket-connector .line{
    width:100%; height:2px; background:rgba(200,255,0,.15); position:relative;
  }
  .bracket-connector .line::after{
    content:''; position:absolute; right:0; top:-10px;
    width:2px; height:22px; background:rgba(200,255,0,.15);
  }

  /* ─── Champion banner ─── */
  .championbanner{
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:20px; color:var(--gold); text-align:center;
    border:1px solid rgba(255,194,61,.3); border-radius:6px;
    padding:14px; margin-bottom:16px; letter-spacing:.04em; text-transform:uppercase;
    background:rgba(255,194,61,.05); text-shadow:0 0 20px rgba(255,194,61,.3);
  }

  /* ─── Login overlay ─── */
  .login-overlay{
    position:fixed; inset:0; background:rgba(3,3,10,.94); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .login-box{
    background:var(--bg-card); border:1px solid var(--line-strong); border-radius:12px;
    padding:28px 22px; width:100%; max-width:340px;
    display:flex; flex-direction:column; gap:12px;
  }
  .login-box input{
    background:var(--bg-card-2); border:1px solid var(--line-strong); color:var(--chalk);
    padding:14px; border-radius:6px; font-size:16px; font-family:'Inter',sans-serif;
    -webkit-appearance:none; width:100%;
  }
  .login-box input:focus{ outline:none; border-color:var(--volt); }
  .loginform{ display:flex; flex-direction:column; gap:10px; max-width:320px; }
  .loginform input{
    background:var(--bg-card-2); border:1px solid var(--line-strong); color:var(--chalk);
    padding:12px 14px; border-radius:6px; font-size:16px; font-family:'Inter',sans-serif;
    -webkit-appearance:none;
  }
  .loginerr{ color:var(--coral); font-size:12px; margin:0; min-height:16px; }
</style>
</head>

function applyFixedTimes(matches){
  matches.forEach(m=>{
    if(m.wo || m.anulado) return;
    const home = getTeam(m.home), away = getTeam(m.away);
    // Reglas globales (siempre)
    FIXED_TIMES.forEach(rule=>{
      if(home.name === rule.teamName || away.name === rule.teamName){
        m.time = rule.time;
      }
    });
    // Reglas por fecha específica
    FIXED_SCHEDULE.forEach(rule=>{
      if(m.jornada === rule.jornada && (home.name === rule.teamName || away.name === rule.teamName)){
        m.time = rule.time;
      }
    });
  });
}

/* seeded RNG so the demo is reproducible on fresh init */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function generateRoundRobin(ids){
  let arr = ids.slice();
  const n = arr.length;
  const numRounds = n - 1;
  const half = n / 2;
  const rounds = [];
  for(let r=0; r<numRounds; r++){
    const pairs = [];
    for(let i=0; i<half; i++){
      const a = arr[i], b = arr[n-1-i];
      pairs.push(r % 2 === 0 ? [a,b] : [b,a]);
    }
    rounds.push(pairs);
    const last = arr.pop();
    arr.splice(1,0,last);
  }
  return rounds;
}

// Arreglos iniciales pre-calculados para el fixture de 11 equipos por zona.
// - Fecha 1: los 10 equipos originales (round 1 del RR de 10 equipos)
// - Fechas 2-11: RR de 11 equipos (12 con dummy LIBRE), sin repetir cruces de Fecha 1
// Zona A: LIBRE, Los Amigos fijo en pos1, originales en el resto
const FIXTURE_INIT_A = ['LIBRE','Los Amigos','Las Águilas (Cacho)','Jamaica','Gasoleros','Rosarinos','Lanús','Primavera','Arbolito','Maléficos','La Canilla','Armate Uno'];
// Zona B: arreglo optimizado para evitar repeticiones con Fecha 1
const FIXTURE_INIT_B = ['LIBRE','811','Charly','Chaco For Ever','La Plaza','Los Piratas','Los Santias','Mondelo','Laureles','Kamikazes','Monte Carlos','Las Águilas (Coco)'];

function generate12TeamRR(initArr){
  // Genera 11 rondas de round-robin para 12 equipos (1 es LIBRE/bye)
  const n = 12, a = [...initArr], rounds = [];
  for(let r=0;r<11;r++){
    const matches=[], bye=[];
    for(let i=0;i<n/2;i++){
      const h=a[i],v=a[n-1-i];
      if(h==='LIBRE'||v==='LIBRE') bye.push(h==='LIBRE'?v:h);
      else matches.push([h,v]);
    }
    rounds.push({matches, bye: bye[0]||null});
    const last=a.pop(); a.splice(1,0,last);
  }
  return rounds; // 11 rondas (usar solo las primeras 10 = Fechas 2-11)
}

function freshState(){
  const teams = TEAM_NAMES.map((name,i)=>({
    id:i+1, name, zone: i<11 ? 'A':'B', retirado:false
  }));
  const byName = n => teams.find(t=>t.name===n)?.id;
  let matchId = 1;
  const matches = [];

  // ── Fecha 1: solo los 10 equipos originales por zona (RR de 10, ronda 1) ──
  const origA = teams.filter(t=>t.zone==='A'&&t.name!=='Los Amigos').map(t=>t.id);
  const origB_raw = teams.filter(t=>t.zone==='B'&&t.name!=='811').map(t=>t.id);
  // Zone B: Mondelo a posición 1 para que Charly no juegue vs Mondelo en Fecha 1
  const mondeloId = byName('Mondelo'), charlyId = byName('Charly');
  let origB = [...origB_raw];
  if(origB.indexOf(charlyId) + origB.indexOf(mondeloId) === origB.length - 1){
    origB = origB.filter(id=>id!==mondeloId); origB.splice(1,0,mondeloId);
  }
  [['A',origA],['B',origB]].forEach(([zone,ids])=>{
    const f1 = generateRoundRobin(ids)[0]; // solo primera ronda
    f1.forEach(([home,away])=>{
      matches.push({id:matchId++,zone,jornada:1,home,away,
        scoreHome:null,scoreAway:null,jugado:false,wo:false,woFor:null,anulado:false,date:null,time:null});
    });
  });

  // ── Fechas 2-11: RR de 11 equipos por zona (usando arreglos optimizados) ──
  [['A',FIXTURE_INIT_A],['B',FIXTURE_INIT_B]].forEach(([zone,initNames])=>{
    const rounds = generate12TeamRR(initNames);
    rounds.slice(0,10).forEach((r, idx)=>{
      r.matches.forEach(([hName,aName])=>{
        const home = byName(hName), away = byName(aName);
        if(home && away){
          matches.push({id:matchId++,zone,jornada:idx+2,home,away,
            scoreHome:null,scoreAway:null,jugado:false,wo:false,woFor:null,anulado:false,date:null,time:null});
        }
      });
    });
  });

  return { teams, matches, finalMatches:[], finalGenerated:false, finalTeams:[], finalFormat:'hexagonal', bracket:null, fixtureVersion: FIXTURE_VERSION };
}

// Migración: preserva Fecha 1 con resultados ya cargados, agrega nuevos equipos y Fechas 2-11
function migrateState(old){
  const fresh = freshState();
  // Mapear equipos viejos a nuevos por nombre
  const nameToNewId = {};
  fresh.teams.forEach(t=>{ nameToNewId[t.name] = t.id; });
  const nameToOldId = {};
  (old.teams||[]).forEach(t=>{ nameToOldId[t.name] = t.id; });

  // Preservar retiros y datos de equipos viejos
  fresh.teams.forEach(t=>{
    const oldT = (old.teams||[]).find(o=>o.name===t.name);
    if(oldT){ t.retirado = oldT.retirado||false; }
  });

  // Preservar Fecha 1 con resultados: reemplazar los matches de Fecha 1 en fresh
  // con los matches de Fecha 1 de old (remapeando IDs de equipo por nombre)
  const oldIdToName = {};
  (old.teams||[]).forEach(t=>{ oldIdToName[t.id] = t.name; });

  const f1matches = (old.matches||[]).filter(m=>m.jornada===1);
  const newF1 = [];
  let nextId = fresh.matches.reduce((mx,m)=>Math.max(mx,m.id),0) + 100;

  f1matches.forEach(m=>{
    const homeName = oldIdToName[m.home], awayName = oldIdToName[m.away];
    const newHome = nameToNewId[homeName], newAway = nameToNewId[awayName];
    if(newHome && newAway){
      newF1.push({...m, id: nextId++, home: newHome, away: newAway});
    }
  });

  // Reemplazar Fecha 1 en fresh con los datos migrados
  const nonF1 = fresh.matches.filter(m=>m.jornada!==1);
  fresh.matches = [...newF1, ...nonF1].sort((a,b)=>a.jornada-b.jornada||a.id-b.id);
  fresh.fixtureVersion = FIXTURE_VERSION;
  return fresh;
}

function simulateScore(rng){
  const roll = rng();
  if(roll < 0.55) return Math.floor(rng()*3); // 0-2 most common
  if(roll < 0.85) return 3;
  return 4;
}

function pad2(n){ return String(n).padStart(2,'0'); }
function toIso(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }

function assignDemoSchedule(state){
  // Zone phase: one matchday per week, both zones play the same weekend.
  const zoneBase = new Date(2026,2,7); // base Saturday for jornada 1
  ['A','B'].forEach(zone=>{
    for(let j=1; j<=9; j++){
      const d = new Date(zoneBase); d.setDate(d.getDate() + (j-1)*7);
      const iso = toIso(d);
      state.matches.filter(m=>m.zone===zone && m.jornada===j).forEach(m=>{ m.date = iso; m.time = '09:00'; });
    }
  });
  // Final phase: weekly, starting the week after the zone phase ends.
  if(state.finalMatches && state.finalMatches.length){
    const finalBase = new Date(zoneBase); finalBase.setDate(finalBase.getDate() + 9*7);
    const maxJornada = Math.max(...state.finalMatches.map(m=>m.jornada));
    for(let j=1; j<=maxJornada; j++){
      const d = new Date(finalBase); d.setDate(d.getDate() + (j-1)*7);
      const iso = toIso(d);
      state.finalMatches.filter(m=>m.jornada===j).forEach(m=>{ m.date = iso; m.time = '10:00'; });
    }
  }
  // Aplicar horarios fijos (ej: Charly siempre a las 08:00)
  applyFixedTimes([...state.matches, ...(state.finalMatches||[])]);
}

function seedDemoData(state){
  const rng = mulberry32(20260621);
  state.matches.forEach(m=>{
    m.scoreHome = simulateScore(rng); m.scoreAway = simulateScore(rng); m.jugado = true;
  });
  saveState(state);
  generateFasePhase(state, rng, true);
  assignDemoSchedule(state);
  saveState(state);
  return state;
}

  if(s.bracket === undefined) s.bracket = null;
  return s;

function persistState(){
  if(usingLive && docRef){
    docRef.set(state).catch(err=>{
      alert('No se pudo guardar: ' + (err && err.message ? err.message : err));
      docRef.get().then(snap=>{ if(snap.exists){ state = normalizeState(snap.data()); renderAll(); } }).catch(()=>{});

function startApp(){
  try{
    if(LIVE_MODE && typeof firebase !== 'undefined'){
      try{
        fbApp = firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();
        auth = firebase.auth();
        usingLive = true;
      }catch(e){ console.error('Firebase init error', e); usingLive = false; }
    }
    if(usingLive){
      liveStatus = 'connecting';
      docRef = db.collection('torneos').doc('mas50');
      docRef.onSnapshot(snap=>{
        try{
          if(snap.exists){
            const loaded = normalizeState(snap.data());
            const savedFp = loaded.teams ? loaded.teams.map(t=>t.name).join('|') : '';
            const needsReset = savedFp !== TEAMS_FINGERPRINT || loaded.fixtureVersion !== FIXTURE_VERSION;
            if(needsReset){
              // Check if it's a migration (old state with 20 teams → new 22 teams)
              const canMigrate = loaded.teams && loaded.teams.length === 20 &&
                TEAM_NAMES.length === 22 &&
                loaded.teams.every(t=>TEAM_NAMES.includes(t.name));
              if(canMigrate){
                state = migrateState(loaded);
              } else {
                state = freshState();
              }
              docRef.set(state).catch(()=>{});
            } else {
              state = loaded;
            }
          } else {
            state = freshState();
            docRef.set(state).catch(()=>{});
          }
          liveStatus = 'online';
          renderAll();
        }catch(e){ console.error('Error procesando datos en vivo', e); fallbackToLocal(); }
      }, err=>{
        console.error('Firestore error', err);
        liveStatus = 'offline';
        fallbackToLocal();
      });
      if(auth){
        auth.onAuthStateChanged(user=>{
          isEditor = !!(user && user.email === EDITOR_EMAIL);
          renderAll();
        });
      }
    } else {
      fallbackToLocal();
    }
  }catch(e){
    console.error('Error fatal iniciando la app', e);
    fallbackToLocal();
  }
}

}

const memoryStore = {};
const safeStorage = {
  getItem(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in memoryStore) ? memoryStore[k] : null; } },
  setItem(k,v){ try{ localStorage.setItem(k,v); }catch(e){ memoryStore[k]=v; } },
  removeItem(k){ try{ localStorage.removeItem(k); }catch(e){ delete memoryStore[k]; } }
};
function loadState(){
  if(EMBEDDED_STATE){ return JSON.parse(JSON.stringify(EMBEDDED_STATE)); }
  const raw = safeStorage.getItem(STORAGE_KEY);
  if(raw){
    try {
      const parsed = JSON.parse(raw);
      const savedFingerprint = parsed.teams ? parsed.teams.map(t=>t.name).join('|') : '';
      if(savedFingerprint === TEAMS_FINGERPRINT && parsed.fixtureVersion === FIXTURE_VERSION) return parsed;
      // Migration: preserve Fecha 1 if old 20-team state
      if(parsed.teams && parsed.teams.length === 20 && TEAM_NAMES.length === 22 &&
         parsed.teams.every(t=>TEAM_NAMES.includes(t.name))){
        return migrateState(parsed);
      }
    } catch(e){ /* fall through */ }
  }
  return freshState();
}
function saveState(s){ safeStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function getTeam(id){ return state.teams.find(t=>t.id===id); }

function computeStandings(matchList, teamIds){
  const map = {};
  teamIds.forEach(id=>{ map[id] = { teamId:id, pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0 }; });
  matchList.forEach(m=>{
    if(m.anulado) return;
    if(!teamIds.includes(m.home) || !teamIds.includes(m.away)) return;
    if(m.wo){
      const winner = m.woFor, loser = (m.home===winner)? m.away : m.home;
      if(map[winner]){ map[winner].pj++; map[winner].g++; map[winner].pts+=2; }
      if(map[loser]){ map[loser].pj++; map[loser].p++; }
      return;
    }
    if(m.jugado && m.scoreHome!==null && m.scoreAway!==null){
      const H=map[m.home], A=map[m.away];
      if(!H||!A) return;
      H.pj++; A.pj++; H.gf+=m.scoreHome; H.gc+=m.scoreAway; A.gf+=m.scoreAway; A.gc+=m.scoreHome;
      if(m.scoreHome>m.scoreAway){ H.g++; H.pts+=2; A.p++; }
      else if(m.scoreHome<m.scoreAway){ A.g++; A.pts+=2; H.p++; }
      else { H.e++; A.e++; H.pts+=1; A.pts+=1; }
    }
  });
  const arr = Object.values(map).map(s=>({...s, dg:s.gf-s.gc, team:getTeam(s.teamId)}));
  arr.sort((a,b)=> b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.team.name.localeCompare(b.team.name));
  return arr;
}

function zoneStandings(zone){
  const teamIds = state.teams.filter(t=>t.zone===zone).map(t=>t.id);
  const matchList = state.matches.filter(m=>m.zone===zone);
  return computeStandings(matchList, teamIds);
}

function generateFasePhase(s, rng, autoSimulate){
  const topA = zoneStandingsFromState(s,'A').slice(0,3).map(x=>x.teamId);
  const topB = zoneStandingsFromState(s,'B').slice(0,3).map(x=>x.teamId);
  const finalIds = [...topA, ...topB];
  const rounds = generateRoundRobin(finalIds);
  let id = 9000;
  const matches = [];
  rounds.forEach((pairs, idx)=>{
    pairs.forEach(([home,away])=>{
      matches.push({ id:id++, zone:'F', jornada: idx+1, home, away,
        scoreHome:null, scoreAway:null, jugado:false, wo:false, woFor:null, anulado:false,
        date:null, time:null });
    });
  });
  if(autoSimulate){
    const r = rng || mulberry32(777);
    matches.forEach(m=>{ m.scoreHome=simulateScore(r); m.scoreAway=simulateScore(r); m.jugado=true; });
  }
  s.finalMatches = matches;
  s.finalTeams = finalIds;
  s.finalGenerated = true;
  saveState(s);
}
// helper used only during seeding (before `state` global exists yet)
function zoneStandingsFromState(s, zone){
  const teamIds = s.teams.filter(t=>t.zone===zone).map(t=>t.id);
  const matchList = s.matches.filter(m=>m.zone===zone);
  const map = {};
  teamIds.forEach(id=>{ map[id]={teamId:id,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0}; });
  matchList.forEach(m=>{
    if(m.anulado) return;
    if(m.wo){
      const w=m.woFor, l=(m.home===w)?m.away:m.home;
      if(map[w]){map[w].pj++;map[w].g++;map[w].pts+=2;}
      if(map[l]){map[l].pj++;map[l].p++;}
      return;
    }
    if(m.jugado){
      const H=map[m.home],A=map[m.away];
      H.pj++;A.pj++;H.gf+=m.scoreHome;H.gc+=m.scoreAway;A.gf+=m.scoreAway;A.gc+=m.scoreHome;
      if(m.scoreHome>m.scoreAway){H.g++;H.pts+=2;A.p++;}
      else if(m.scoreHome<m.scoreAway){A.g++;A.pts+=2;H.p++;}
      else {H.e++;A.e++;H.pts+=1;A.pts+=1;}
    }
  });
  const arr = Object.values(map).map(x=>({...x, dg:x.gf-x.gc, teamId:x.teamId}));
  arr.sort((a,b)=> b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || 0);
  return arr;
}

function setTeamScore(matchId, side, value){
  const m = state.matches.find(x=>x.id===matchId) || state.finalMatches.find(x=>x.id===matchId);
  if(!m) return;
  const v = value === "" ? null : Math.max(0, Math.min(99, parseInt(value,10)||0));
  if(side==='home') m.scoreHome = v; else m.scoreAway = v;
  m.jugado = (m.scoreHome!==null && m.scoreAway!==null);
  persistState();
  renderAll();
}

function retireTeam(teamId, retirado){
  const team = getTeam(teamId);
  if(retirado){
    const ok = confirm(`¿Confirmás retirar a "${team.name}" del torneo?\n\nLos partidos pendientes de este equipo se darán por W.O. a favor del rival (2 puntos).`);
    if(!ok) return;
  }
  team.retirado = retirado;
  const allMatches = [...state.matches, ...state.finalMatches];
  allMatches.forEach(m=>{
    if(m.home!==teamId && m.away!==teamId) return;
    if(retirado){
      if(m.jugado) return; // ya jugado, no se toca
      const opponentId = m.home===teamId ? m.away : m.home;
      const opponent = getTeam(opponentId);
      if(opponent && opponent.retirado){ m.anulado = true; m.wo=false; m.woFor=null; }
      else { m.wo = true; m.woFor = opponentId; }
    } else {
      if(m.wo){ m.wo=false; m.woFor=null; }
      if(m.anulado){
        const opponentId = m.home===teamId ? m.away : m.home;
        const opponent = getTeam(opponentId);
        if(!opponent || !opponent.retirado){ m.anulado=false; }
      }
    }
  });
  persistState();
  renderAll();
}

function resetDemo(){
  const ok = confirm("Esto borra todos los resultados cargados y deja el fixture en cero. ¿Continuar?");

}

function regenerateFase(){
  const ok = confirm("Esto reconstruye la Fase Final tomando los 3 primeros actuales de cada zona. Se perderán los resultados ya cargados en la fase final. ¿Continuar?");
  if(!ok) return;
  generateFasePhase(state, null, false);
  state.finalMatches.forEach(m=>{ m.scoreHome=null; m.scoreAway=null; m.jugado=false; });
  persistState();
  renderAll();
}

const DOW_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTH_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function formatDateLong(dateStr){
  if(!dateStr) return '';
  const [y,mo,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, mo-1, d);
  const dow = DOW_ES[dt.getDay()];
  return `${dow.charAt(0).toUpperCase()+dow.slice(1)} ${d} de ${MONTH_ES[mo-1]}`;
}

function matchesOf(zone, jornada){
  return zone==='F'
    ? state.finalMatches.filter(m=>m.jornada===jornada)
    : state.matches.filter(m=>m.zone===zone && m.jornada===jornada);
}

function commonScheduleFor(matches){
  const dates = [...new Set(matches.filter(m=>!m.anulado).map(m=>m.date).filter(Boolean))];
  const times = [...new Set(matches.filter(m=>!m.anulado).map(m=>m.time).filter(Boolean))];
  return { date: dates.length===1 ? dates[0] : '', time: times.length===1 ? times[0] : '' };
}

function setMatchSchedule(matchId, field, value){
  const all = [...state.matches, ...state.finalMatches];
  const m = all.find(x=>x.id===matchId);
  if(!m) return;
  m[field] = value || null;
  persistState();
  renderAll();
}

function applyJornadaSchedule(zone, jornada){
  const dateEl = document.getElementById(`jdate-${zone}-${jornada}`);
  const timeEl = document.getElementById(`jtime-${zone}-${jornada}`);
  const date = dateEl.value || null;
  const time = timeEl.value || null;
  matchesOf(zone, jornada).forEach(m=>{ if(!m.anulado){ m.date = date; m.time = time; } });
  applyFixedTimes(matchesOf(zone, jornada));
  persistState();
  renderAll();
}

/* ============== LLAVE DE ELIMINACIÓN DIRECTA ============== */
const BRACKET_DOWNSTREAM = {
  r1a:['sf2','final','third'], r1b:['sf1','final','third'],
  sf1:['final','third'], sf2:['final','third'], final:[], third:[]
};

function seedForBracket(){
  const a = zoneStandings('A').slice(0,3);
  const b = zoneStandings('B').slice(0,3);
  const combined = [...a, ...b];
  combined.sort((x,y)=> y.pts-x.pts || y.dg-x.dg || y.gf-x.gf || x.team.name.localeCompare(y.team.name));
  return combined.map(r=>r.teamId);
}

function buildBracket(){
  const seeds = seedForBracket();
  state.bracket = {
    seeds,
    matches: {
      r1a:   { id:'r1a',   round:'Cuartos',     teamA:seeds[2], teamB:seeds[5], scoreA:null, scoreB:null, penalWinner:null },
      r1b:   { id:'r1b',   round:'Cuartos',     teamA:seeds[3], teamB:seeds[4], scoreA:null, scoreB:null, penalWinner:null },
      sf1:   { id:'sf1',   round:'Semifinal',   teamA:seeds[0], teamB:null,     scoreA:null, scoreB:null, penalWinner:null, from:'r1b' },
      sf2:   { id:'sf2',   round:'Semifinal',   teamA:seeds[1], teamB:null,     scoreA:null, scoreB:null, penalWinner:null, from:'r1a' },
      final: { id:'final', round:'Final',       teamA:null,     teamB:null,     scoreA:null, scoreB:null, penalWinner:null, fromA:'sf2', fromB:'sf1' },
      third: { id:'third', round:'3er puesto',  teamA:null,     teamB:null,     scoreA:null, scoreB:null, penalWinner:null, fromA:'sf2', fromB:'sf1', useLoser:true }
    }
  };
  propagateBracket();
}

function getMatchResult(m){
  if(!m) return null;
  if(m.penalWinner) return m.penalWinner;
  if(m.scoreA!==null && m.scoreB!==null && m.scoreA!==m.scoreB){
    return m.scoreA > m.scoreB ? m.teamA : m.teamB;
  }
  return null;
}
function getMatchLoser(m){
  const w = getMatchResult(m);
  if(!w || !m.teamA || !m.teamB) return null;
  return w===m.teamA ? m.teamB : m.teamA;
}

function propagateBracket(){
  const M = state.bracket.matches;
  M.sf1.teamB = getMatchResult(M.r1b);
  M.sf2.teamB = getMatchResult(M.r1a);
  M.final.teamA = getMatchResult(M.sf2);
  M.final.teamB = getMatchResult(M.sf1);
  M.third.teamA = getMatchLoser(M.sf2);
  M.third.teamB = getMatchLoser(M.sf1);
}

function clearBracketMatch(m){ m.scoreA=null; m.scoreB=null; m.penalWinner=null; }

function setBracketScore(matchId, side, value){
  const M = state.bracket.matches;
  const m = M[matchId];
  const v = value === "" ? null : Math.max(0, Math.min(99, parseInt(value,10)||0));
  if(side==='A') m.scoreA = v; else m.scoreB = v;
  m.penalWinner = null;
  (BRACKET_DOWNSTREAM[matchId]||[]).forEach(id=>clearBracketMatch(M[id]));
  propagateBracket();
  persistState();
  renderAll();
}

function setBracketPenalWinner(matchId, teamId){
  const M = state.bracket.matches;
  const m = M[matchId];
  m.penalWinner = teamId ? Number(teamId) : null;
  (BRACKET_DOWNSTREAM[matchId]||[]).forEach(id=>clearBracketMatch(M[id]));
  propagateBracket();
  persistState();
  renderAll();
}

function switchFinalFormat(fmt){
  if(fmt === state.finalFormat) return;
  const ok = confirm('Cambiar el formato de la Fase Final borra los resultados actuales de esa fase. ¿Continuar?');
  if(!ok) return;
  state.finalFormat = fmt;
  if(fmt === 'eliminacion'){
    buildBracket();
  } else {
    state.finalGenerated = false; state.finalMatches = []; state.finalTeams = [];
    generateFasePhase(state, null, false);
  }
  persistState();
  renderAll();
}

function createFasePhase(){
  generateFasePhase(state);
  persistState();
  renderAll();
}

function rebuildBracketConfirm(){

  if(!ok) return;

}

function buildWhatsAppText(zone, jornada){
  const matches = matchesOf(zone, jornada).filter(m=>!m.anulado);
  const sorted = matches.slice().sort((a,b)=>{
    const ak = (a.date||'9999-99-99')+' '+(a.time||'99:99');
    const bk = (b.date||'9999-99-99')+' '+(b.time||'99:99');
    return ak.localeCompare(bk);
  });
  const zoneLabel = zone==='F' ? 'FASE FINAL' : `ZONA ${zone}`;
  const lines = [];
  lines.push(`⚽ *CRISTINA LIBRE — ${zoneLabel}*`);
  lines.push(`📅 *Fecha ${jornada}*`);
  lines.push('');
  let lastGroup = null;
  sorted.forEach(m=>{
    const groupKey = m.date || 'sin-fecha';
    if(groupKey !== lastGroup){
      lines.push(m.date ? `🗓️ ${formatDateLong(m.date)}` : '🗓️ Sin horario asignado');
      lastGroup = groupKey;
    }
    const home = getTeam(m.home).name, away = getTeam(m.away).name;
    if(m.wo){
      lines.push(`   ${home} vs ${away} → W.O. a favor de ${getTeam(m.woFor).name}`);
    } else {
      const hora = m.time ? `🕐 ${m.time} hs` : '🕐 a confirmar';
      lines.push(`   ${hora}   ${home} vs ${away}`);
    }
  });
  lines.push('');
  const bye = getByeTeam(zone, jornada);
  if(bye) lines.push(`🔘 *Descansa esta fecha: ${bye.name}*`);
  lines.push('_Cualquier cambio de horario se avisa por este mismo medio._');
  return lines.join('\n');
}

function exportWhatsApp(zone, jornada){
  const text = buildWhatsAppText(zone, jornada);
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function copyJornadaText(zone, jornada, btn){
  const text = buildWhatsAppText(zone, jornada);
  const done = ()=>{
    const original = btn.textContent;
    btn.textContent = '¡Copiado!';
    setTimeout(()=>{ btn.textContent = original; }, 1500);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{ alert(text); });
  } else {
    alert(text);
  }
}

}

function drawLogoOnCanvas(ctx, cx, cy, r){
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
  if(LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0){
    const iw = LOGO_IMG.naturalWidth, ih = LOGO_IMG.naturalHeight;
    const scale = (r*2) / Math.min(iw, ih);
    const dw = iw*scale, dh = ih*scale;
    ctx.drawImage(LOGO_IMG, cx-dw/2, cy-dh/2, dw, dh);
  } else {
    ctx.fillStyle = '#0d2456'; ctx.fillRect(cx-r, cy-r, r*2, r*2);
  }
  ctx.restore();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(200,255,0,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
}

function drawJornadaCanvas(zone, jornada, matches){
  const margin = 28, rowH = 88, footH = 38;
  const width = 620;
  const scale = 2;

  const bannerH = (LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0)
    ? Math.round(width * LOGO_IMG.naturalHeight / LOGO_IMG.naturalWidth) : 0;
  const headH = bannerH + 68;
  const height = headH + matches.length * rowH + footH;

  const canvas = document.createElement('canvas');
  canvas.width = width * scale; canvas.height = height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#06060f'; ctx.fillRect(0,0,width,height);

  // Banner
  if(LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0){
    ctx.drawImage(LOGO_IMG, 0, 0, width, bannerH);
    const fade = ctx.createLinearGradient(0, bannerH-40, 0, bannerH);
    fade.addColorStop(0,'rgba(6,6,15,0)'); fade.addColorStop(1,'rgba(6,6,15,1)');
    ctx.fillStyle = fade; ctx.fillRect(0, bannerH-40, width, 40);
  }

  // Header
  const hy = bannerH + 26;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c8ff00';
  ctx.font = '900 20px Barlow Condensed, sans-serif';
  const zoneLabel = zone==='F' ? 'FASE FINAL' : `ZONA ${zone}`;
  ctx.fillText(`${zoneLabel}  ·  FECHA ${jornada}`, width/2, hy);

  // BYE team sub-header
  const byeT = getByeTeam(zone, jornada);
  if(byeT){
    ctx.font = '500 11px IBM Plex Mono, monospace';
    ctx.fillStyle = 'rgba(200,255,0,.4)';
    ctx.fillText(`🔘 Descansa: ${byeT.name}`, width/2, hy + 18);
  }

  ctx.strokeStyle = 'rgba(200,255,0,.2)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(margin, headH-10); ctx.lineTo(width-margin, headH-10); ctx.stroke();

  // Match rows
  matches.forEach((m, i)=>{
    const y = headH + i * rowH;
    const cx = width / 2;
    if(i % 2 === 0){ ctx.fillStyle = 'rgba(255,255,255,.02)'; ctx.fillRect(0, y, width, rowH); }

    const homeT = getTeam(m.home), awayT = getTeam(m.away);

    // DATE + TIME — centered top
    const dateY = y + 22;
    if(!m.wo && !m.anulado){
      const dateStr = m.date ? formatDateLong(m.date) : 'Fecha a confirmar';
      const timeStr = m.time ? m.time.slice(0,5) + 'hs' : '';

      // measure total width of both pills to center them
      ctx.font = '600 13px Oswald, sans-serif';
      const dateW = ctx.measureText(dateStr).width + 22;
      ctx.font = '900 15px Barlow Condensed, sans-serif';
      const timeW = timeStr ? ctx.measureText(timeStr).width + 22 : 0;
      const gap = timeStr ? 8 : 0;
      const totalW = dateW + gap + timeW;
      let pillX = cx - totalW/2;

      // Date pill — white
      ctx.font = '600 13px Oswald, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(pillX, dateY-15, dateW, 20);
      ctx.fillStyle = '#06060f';
      ctx.textAlign = 'left';
      ctx.fillText(dateStr, pillX + 11, dateY);

      // Time pill — volt
      if(timeStr){
        const tpX = pillX + dateW + gap;
        ctx.font = '900 15px Barlow Condensed, sans-serif';
        ctx.fillStyle = 'rgba(200,255,0,.1)';
        ctx.fillRect(tpX, dateY-15, timeW, 20);
        ctx.strokeStyle = 'rgba(200,255,0,.45)'; ctx.lineWidth = 1;
        ctx.strokeRect(tpX, dateY-15, timeW, 20);
        ctx.fillStyle = '#c8ff00';
        ctx.fillText(timeStr, tpX + 11, dateY);
      }
    }

    // TEAMS + SCORE — centered bottom
    const teamsY = y + 65;
    ctx.font = '600 14px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = homeT.retirado ? 'rgba(255,255,255,.3)' : '#ffffff';
    ctx.fillText(homeT.name, margin, teamsY);
    ctx.textAlign = 'right';
    ctx.fillStyle = awayT.retirado ? 'rgba(255,255,255,.3)' : '#ffffff';
    ctx.fillText(awayT.name, width-margin, teamsY);

    ctx.textAlign = 'center';
    if(m.anulado){
      ctx.font = '600 10px IBM Plex Mono, monospace'; ctx.fillStyle = 'rgba(255,255,255,.3)';
      ctx.fillText('ANULADO', cx, teamsY);
    } else if(m.wo){
      ctx.font = '700 13px Barlow Condensed, sans-serif'; ctx.fillStyle = '#ff4d6a';
      ctx.fillText('W.O.', cx, teamsY);
    } else if(m.jugado){
      ctx.font = '900 34px Barlow Condensed, sans-serif'; ctx.fillStyle = '#c8ff00';
      ctx.fillText(`${m.scoreHome}  –  ${m.scoreAway}`, cx, teamsY);
    } else {
      ctx.font = '700 15px Barlow Condensed, sans-serif'; ctx.fillStyle = 'rgba(200,255,0,.2)';
      ctx.fillText('VS', cx, teamsY);
    }

    // divider
    ctx.strokeStyle = 'rgba(255,255,255,.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(margin, y+rowH-1); ctx.lineTo(width-margin, y+rowH-1); ctx.stroke();
  });

  // Footer
  ctx.strokeStyle = 'rgba(200,255,0,.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(margin, height-footH+8); ctx.lineTo(width-margin, height-footH+8); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = '500 10px IBM Plex Mono, monospace';
  ctx.fillStyle = 'rgba(200,255,0,.22)';
  ctx.fillText('CRISTINA LIBRE · FIXTURE Y POSICIONES', width/2, height-footH+26);

  return canvas;
}

function drawStandingsCanvas(rows, opts){
  const margin = 26, rowH = 38, tableHeadH = 30, footH = 38;
  let cursorX = margin;
  const colsX = STANDINGS_COLS.map(c=>{ const x = cursorX; cursorX += c.width; return {...c, x}; });
  const tableWidth = cursorX - margin;
  const width = tableWidth + margin*2;
  const scale = 2;

  const bannerH = (LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0)
    ? Math.round(width * LOGO_IMG.naturalHeight / LOGO_IMG.naturalWidth)
    : 0;
  const headH = bannerH + 80;
  const height = headH + tableHeadH + rows.length*rowH + footH;

  const canvas = document.createElement('canvas');
  canvas.width = width*scale; canvas.height = height*scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  const grad = ctx.createLinearGradient(0,0,0,height);
  grad.addColorStop(0,'#0c2a66'); grad.addColorStop(1,'#020714');
  ctx.fillStyle = grad; ctx.fillRect(0,0,width,height);

  if(LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0){
    ctx.drawImage(LOGO_IMG, 0, 0, width, bannerH);
    const fade = ctx.createLinearGradient(0, bannerH-30, 0, bannerH);
    fade.addColorStop(0,'rgba(12,42,102,0)'); fade.addColorStop(1,'rgba(12,42,102,1)');
    ctx.fillStyle = fade; ctx.fillRect(0, bannerH-30, width, 30);
  }

  const hy = bannerH + 30;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#c8ff00';
  ctx.font = '700 22px Oswald, sans-serif';
  ctx.fillText(opts.subtitle, margin, hy);
  ctx.fillStyle = 'rgba(234,243,255,0.45)';
  ctx.font = '400 10.5px IBM Plex Mono, monospace';
  ctx.fillText('Actualizado ' + opts.fecha, margin, hy + 20);
  ctx.strokeStyle = 'rgba(234,243,255,0.2)';
  ctx.beginPath(); ctx.moveTo(margin, headH-8); ctx.lineTo(width-margin, headH-8); ctx.stroke();

  const ty = headH + 20;
  ctx.font = '600 10.5px Oswald, sans-serif';
  ctx.fillStyle = 'rgba(234,243,255,0.55)';
  colsX.forEach(c=>{
    ctx.textAlign = c.align;
    ctx.fillText(c.label, c.align==='left' ? c.x : c.x + c.width/2, ty);
  });
  ctx.strokeStyle = 'rgba(234,243,255,0.3)';
  ctx.beginPath(); ctx.moveTo(margin, headH+tableHeadH-6); ctx.lineTo(width-margin, headH+tableHeadH-6); ctx.stroke();

  rows.forEach((r,i)=>{
    const y = headH + tableHeadH + i*rowH;
    if(i % 2 === 1){ ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(margin-4, y, tableWidth+8, rowH); }
    const isQual = opts.qualCount && i < opts.qualCount;
    const isChamp = opts.champion && i === 0;
    if(isQual){ ctx.fillStyle = '#c8ff00'; ctx.fillRect(margin-4, y+5, 3, rowH-10); }
    const textY = y + rowH/2 + 5;
    colsX.forEach(c=>{
      ctx.textAlign = c.align;
      const drawX = c.align==='left' ? c.x + (isQual?8:0) : c.x + c.width/2;
      if(c.key==='pos'){
        ctx.font='500 12px IBM Plex Mono, monospace'; ctx.fillStyle='rgba(234,243,255,0.5)';
        ctx.fillText(String(i+1), drawX, textY);
      } else if(c.key==='team'){
        ctx.font = isChamp ? '600 14px Inter, sans-serif' : '500 14px Inter, sans-serif';
        ctx.fillStyle = isChamp ? '#ffc23d' : '#eaf3ff';
        const label = (isChamp?'🏆 ':'') + r.team.name + (r.team.retirado?'  (RET)':'');
        ctx.fillText(label, drawX, textY);
      } else if(c.key==='pts'){
        ctx.font='600 14px IBM Plex Mono, monospace'; ctx.fillStyle='#ffc23d';
        ctx.fillText(String(r.pts), drawX, textY);
      } else {
        ctx.font='400 12.5px IBM Plex Mono, monospace'; ctx.fillStyle='#eaf3ff';
        let val = r[c.key]; if(c.key==='dg') val = (val>0?'+':'')+val;
        ctx.fillText(String(val), drawX, textY);
      }
    });
  });

  ctx.strokeStyle = 'rgba(234,243,255,0.15)';
  ctx.beginPath(); ctx.moveTo(margin, height-footH+6); ctx.lineTo(width-margin, height-footH+6); ctx.stroke();
  ctx.textAlign = 'left';
  ctx.font = '400 10px IBM Plex Mono, monospace';
  ctx.fillStyle = 'rgba(234,243,255,0.4)';
  ctx.fillText('Cristina Libre · fixture y posiciones', margin, height-footH+24);

  return canvas;
}

function showImageModal(canvas, filename){
  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const modal = document.createElement('div');
    modal.className = 'imgmodal';
    modal.innerHTML = `
      <div class="imgmodal-card">
        <img src="${url}" alt="Tabla de posiciones">
        <div class="imgmodal-actions">
          <button class="action" id="imgShareBtn">📲 Compartir / Guardar</button>
          <button class="action ghost" id="imgCloseBtn">Cerrar</button>
        </div>
        <p class="imgmodal-hint">En el celular podés mantener presionada la imagen para guardarla o compartirla directo por WhatsApp.</p>
      </div>
    `;
    document.body.appendChild(modal);
    const cleanup = ()=>{ modal.remove(); URL.revokeObjectURL(url); };
    modal.addEventListener('click', e=>{ if(e.target===modal) cleanup(); });
    document.getElementById('imgCloseBtn').onclick = cleanup;
    document.getElementById('imgShareBtn').onclick = async ()=>{
      try{
        const file = new File([blob], filename, {type:'image/png'});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:'Cristina Libre'});
          return;
        }
      }catch(e){ /* fall back to download below */ }
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
    };
  }, 'image/png');
}

function exportReadOnlyVersion(){
  const ok = confirm("Esto descarga una copia de este archivo en modo solo lectura, con los datos de ahora mismo, para mandar a otras personas. Vos seguís editando desde este archivo. ¿Generar la copia?");
  if(!ok) return;
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const snapshot = JSON.stringify(state);
  const out = html
    .replace('let VIEW_ONLY = false;', 'let VIEW_ONLY = true;')
    .replace('let EMBEDDED_STATE = null;', 'let EMBEDDED_STATE = ' + snapshot + ';');
  const blob = new Blob([out], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `torneo-mas50-solo-lectura-${todayLabel().replace(/\//g,'-')}.html`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}

function matchRowHtml(m, homeT, awayT){
  const homeVal = m.scoreHome===null ? '' : m.scoreHome;
  const awayVal = m.scoreAway===null ? '' : m.scoreAway;

  // Score block — texto grande si es solo lectura, inputs si es editor
  let scoreBlockHtml;
  if(isViewOnly()){
    if(m.anulado){
      scoreBlockHtml = `<div class="score-block"><span class="score-display anulado">ANUL.</span></div>`;
    } else if(m.wo){
      scoreBlockHtml = `<div class="score-block"><span class="score-display wo">W.O.</span></div>`;
    } else if(m.jugado){
      scoreBlockHtml = `<div class="score-block"><span class="score-display">${m.scoreHome}</span><span class="dash">–</span><span class="score-display">${m.scoreAway}</span></div>`;
    } else {
      scoreBlockHtml = `<div class="score-block"><span class="score-vs">VS</span></div>`;
    }
  } else {
    const disabled = (m.wo || m.anulado) ? 'disabled' : '';
    scoreBlockHtml = `
      <div class="score-block">
        <input class="scorebox" type="number" min="0" max="99" value="${homeVal}" ${disabled}
          onchange="setTeamScore(${m.id}, 'home', this.value)">
        <span class="dash">–</span>
        <input class="scorebox" type="number" min="0" max="99" value="${awayVal}" ${disabled}
          onchange="setTeamScore(${m.id}, 'away', this.value)">
      </div>`;
  }

  let statusLabel = m.anulado ? 'ANULADO' : m.wo ? `W.O. → ${getTeam(m.woFor).name}` : m.jugado ? 'JUGADO ✓' : 'PENDIENTE';
  let statusClass = m.jugado ? 'ok' : (m.wo||m.anulado) ? 'wo' : 'pend';

  // Fecha y hora — grandes y bien visibles
  let whenHtml = '';
  if(!m.wo && !m.anulado){
    if(isViewOnly()){
      const dateStr = m.date ? formatDateLong(m.date) : 'Fecha a confirmar';
      const timeStr = m.time ? m.time.slice(0,5) + 'hs' : '';
      whenHtml = `
        <div class="match-when-row">
          <span class="match-date">${dateStr}</span>
          ${timeStr ? `<span class="match-time">${timeStr}</span>` : ''}
        </div>`;
    } else {
      const dateStr = m.date ? formatDateLong(m.date) : '';
      const timeStr = m.time || '';
      whenHtml = `
        <div class="match-when-row">
          <div class="match-edit-when">
            <input class="sched-date" type="date" value="${m.date||''}"
              onchange="setMatchSchedule(${m.id}, 'date', this.value)">
            <input class="sched-time" type="time" value="${m.time||''}"
              onchange="setMatchSchedule(${m.id}, 'time', this.value)">
          </div>
        </div>`;
    }
  }

  return `
    <div class="match-card ${m.jugado?'played':''} ${m.wo||m.anulado?'special':''}">
      <div class="match-main">
        <span class="teamname left ${homeT.retirado?'ret':''}">${homeT.name}</span>
        ${scoreBlockHtml}

      </div>
      ${whenHtml}
      <div class="match-status-row">
        <span class="status ${statusClass}">${statusLabel}</span>
      </div>
    </div>
  `;
}

function getByeTeam(zone, jornada){
  const zoneTeams = state.teams.filter(t=>t.zone===zone);
  const playingIds = new Set();
  state.matches.filter(m=>m.zone===zone&&m.jornada===jornada).forEach(m=>{
    playingIds.add(m.home); playingIds.add(m.away);
  });
  return zoneTeams.find(t=>!playingIds.has(t.id)) || null;
}

        <button class="action small" onclick="exportZoneStandingsImage('B')">📷 Exportar imagen</button>
