      ${standingsTableHtml(b,3)}
    </div>
  `;
}

function renderEquipos(){
  const a = state.teams.filter(t=>t.zone==='A');
  const b = state.teams.filter(t=>t.zone==='B');
  const itemHtml = t => `
    <div class="teamitem">
      <span class="nm"><span class="zonedot ${t.zone}"></span>${t.name}</span>
      ${isViewOnly()
        ? `<span class="retbadge" style="${t.retirado?'':'opacity:.35;border-color:var(--chalk-faint);color:var(--chalk-faint);'}">${t.retirado?'RETIRADO':'ACTIVO'}</span>`
        : `<label class="switch">
            <input type="checkbox" ${t.retirado?'checked':''} onchange="retireTeam(${t.id}, this.checked)">
            <span class="slider"></span>
          </label>`
      }
    </div>
  `;
  return `
    <h2 class="sectiontitle">Equipos <span class="tag">Marcá un retiro para aplicar W.O. automático</span></h2>
    <div class="card">
      <div class="teamlist">
        <div>${a.map(itemHtml).join('')}</div>
        <div>${b.map(itemHtml).join('')}</div>
      </div>
    </div>
    ${isViewOnly() ? '' : '<button class="action ghost" onclick="resetDemo()">Borrar todos los resultados</button>'}
  `;
}

function teamLabelFor(teamId, fallback){
  return teamId ? getTeam(teamId).name : (fallback || 'A definir');
}

function feederGraphicHtml(){
  const topA = zoneStandings('A').slice(0,3);
  const topB = zoneStandings('B').slice(0,3);
  const seedRow = rows => rows.map((r,i)=>`<div class="feeder-seed"><span class="feeder-pos">${i+1}°</span>${r.team.name}</div>`).join('');
  return `
    <div class="feeder">
      <div class="feeder-col">
        <div class="feeder-label za">Zona A</div>
        ${seedRow(topA)}
      </div>
      <div class="feeder-arrow">›</div>
      <div class="feeder-center">FASE FINAL<br><span>Hexagonal</span></div>
      <div class="feeder-arrow">‹</div>
      <div class="feeder-col">
        <div class="feeder-label zb">Zona B</div>
        ${seedRow(topB)}
      </div>
    </div>
  `;
}

function seedListHtml(){
  const seeds = state.bracket.seeds;
  return `
    <div class="card" style="padding:14px 18px; margin-bottom:18px;">
      <div style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--chalk-faint); letter-spacing:.03em;">
        SEMBRADOS: ${seeds.map((id,i)=>`${i+1}° ${getTeam(id).name}`).join(' · ')}
      </div>
    </div>
  `;
}

function bracketMatchHtml(m, fallbackA, fallbackB){
  const ready = m.teamA && m.teamB;
  const dis = (isViewOnly() || !ready) ? 'disabled' : '';
  const winner = getMatchResult(m);
  const tied = ready && m.scoreA!==null && m.scoreB!==null && m.scoreA===m.scoreB && !m.penalWinner;
  return `
    <div class="bm ${winner?'decided':''}">
      <div class="bm-row ${winner && winner===m.teamA?'win':''}">
        <span class="bm-team">${teamLabelFor(m.teamA, fallbackA)}</span>
        <input class="bm-score" type="number" min="0" max="99" value="${m.scoreA===null?'':m.scoreA}" ${dis}
          onchange="setBracketScore('${m.id}','A',this.value)">
      </div>
      <div class="bm-row ${winner && winner===m.teamB?'win':''}">
        <span class="bm-team">${teamLabelFor(m.teamB, fallbackB)}</span>
        <input class="bm-score" type="number" min="0" max="99" value="${m.scoreB===null?'':m.scoreB}" ${dis}
          onchange="setBracketScore('${m.id}','B',this.value)">
      </div>
      ${tied && !isViewOnly() ? `
        <select class="bm-penal" onchange="setBracketPenalWinner('${m.id}', this.value)">
          <option value="">¿Quién pasa? (penales)</option>
          <option value="${m.teamA}">${getTeam(m.teamA).name}</option>
          <option value="${m.teamB}">${getTeam(m.teamB).name}</option>
        </select>` : ''}
      ${m.penalWinner ? `<div class="bm-penalnote">Pasa por penales: ${getTeam(m.penalWinner).name}</div>` : ''}
    </div>
  `;
}

function renderBracketView(){
  const M = state.bracket.matches;
  return `
    <div class="bracket">
      <div class="bracket-col r1">
        <div class="bracket-col-title">Cuartos</div>
        ${bracketMatchHtml(M.r1a)}
        ${bracketMatchHtml(M.r1b)}
      </div>
      <div class="bracket-col sf">
        <div class="bracket-col-title">Semifinal</div>
        ${bracketMatchHtml(M.sf2, null, 'Ganador Cuartos 1')}
        ${bracketMatchHtml(M.sf1, null, 'Ganador Cuartos 2')}
      </div>
      <div class="bracket-col fcol">
        <div class="bracket-col-title">Final</div>
        ${bracketMatchHtml(M.final, 'Ganador Semifinal 1', 'Ganador Semifinal 2')}
        <div class="bracket-col-title bracket-third-title">3er puesto</div>
        ${bracketMatchHtml(M.third, 'Perdedor Semifinal 1', 'Perdedor Semifinal 2')}
      </div>
    </div>
  `;
}

function renderFinal(){
  const format = state.finalFormat || 'hexagonal';
  const switcher = isViewOnly() ? '' : `
    <div class="formatswitch">
      <button class="fmtbtn ${format==='hexagonal'?'active':''}" onclick="switchFinalFormat('hexagonal')">Hexagonal</button>
      <button class="fmtbtn ${format==='eliminacion'?'active':''}" onclick="switchFinalFormat('eliminacion')">Eliminación directa</button>
    </div>
  `;
  return format === 'eliminacion' ? renderEliminationTab(switcher) : renderHexagonalTab(switcher);
}

function renderHexagonalTab(switcher){
  if(!state.finalGenerated){
    return `
      <h2 class="sectiontitle">Fase Final <span class="tag">Hexagonal</span></h2>
      ${switcher}
      <div class="card empty">
        <p>Los 3 primeros de cada zona juegan un hexagonal (todos contra todos) para definir el orden del 1° al 6° puesto.</p>
        ${isViewOnly()
          ? '<p style="font-size:13px;">Todavía no fue generada por el organizador.</p>'
          : '<button class="action" onclick="createFasePhase()">Generar Fase Final</button>'}
      </div>
    `;
  }
  const teamIds = state.finalTeams;
  const rows = computeStandings(state.finalMatches, teamIds);
  const byJornada = {};
  state.finalMatches.forEach(m=>{ (byJornada[m.jornada] ||= []).push(m); });
  const jornadas = Object.keys(byJornada).map(Number).sort((a,b)=>a-b);
  return `
    <h2 class="sectiontitle">Fase Final <span class="tag">Hexagonal · 3 de Zona A + 3 de Zona B</span></h2>
    ${switcher}
    ${feederGraphicHtml()}
    <div class="card">
      ${jornadas.map(j=>`
        <div class="jornada">
          ${jornadaHeaderHtml('F', j, byJornada[j])}
          ${byJornada[j].map(m=>matchRowHtml(m, getTeam(m.home), getTeam(m.away))).join('')}
        </div>
      `).join('')}
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
        <h3 style="font-family:'Oswald',sans-serif;color:var(--green);font-size:14px;letter-spacing:.06em;text-transform:uppercase;margin:0;">Posiciones finales</h3>
        <button class="action small" onclick="exportFinalStandingsImage()">📷 Exportar imagen</button>
      </div>
      <table class="standings">
        <thead><tr><th></th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr></thead>
        <tbody>
          ${rows.map((r,i)=>`
            <tr class="${i===0?'champion':''}">
              <td class="pos">${i+1}°</td>
              <td class="teamcell">${i===0?'🏆 ':''}${r.team.name}${r.team.retirado?'<span class="retbadge">RET</span>':''}</td>
              <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td>
              <td>${r.gf}</td><td>${r.gc}</td><td>${r.dg>0?'+':''}${r.dg}</td>
              <td class="pts">${r.pts}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    ${isViewOnly() ? '' : '<button class="action ghost" onclick="regenerateFase()">Reconstruir fase final desde la tabla actual</button>'}
  `;
}

function renderEliminationTab(switcher){
  if(!state.bracket){
    return `
      <h2 class="sectiontitle">Fase Final <span class="tag">Eliminación directa</span></h2>
      ${switcher}
      <div class="card empty">
        <p>Los 3 primeros de cada zona entran a una llave de eliminación directa: cuartos, semifinal, final y tercer puesto, con bye para los dos mejor ubicados.</p>
        ${isViewOnly()
          ? '<p style="font-size:13px;">Todavía no fue generada por el organizador.</p>'
          : '<button class="action" onclick="buildBracket(); persistState(); renderAll();">Generar llave</button>'}
      </div>
    `;
  }
  const champ = getMatchResult(state.bracket.matches.final);
  return `
    <h2 class="sectiontitle">Fase Final <span class="tag">Eliminación directa</span></h2>
    ${switcher}
    ${seedListHtml()}
    ${champ ? `<div class="championbanner">🏆 Campeón: ${getTeam(champ).name}</div>` : ''}
    <div class="card">
      ${renderBracketView()}
    </div>
    ${isViewOnly() ? '' : '<button class="action ghost" onclick="rebuildBracketConfirm()">Re-armar llave desde la tabla actual</button>'}
  `;
}

function renderReglamento(){
  return `
    <h2 class="sectiontitle">Reglamento <span class="tag">Resumen de las bases del torneo</span></h2>
    <div class="card reglas">
      <h4>Participación</h4>
      <p>Equipos completos con la indumentaria correspondiente (camiseta y short), 11 titulares y medias largas para todos los jugadores. Los delegados presentan la documentación antes de cada partido.</p>
      <h4>Jugadores menores</h4>
      <p>El equipo que presente dos o más jugadores por debajo de la edad mínima pierde los puntos en disputa de ese partido.</p>
      <h4>Sanciones</h4>
      <p>Doble amarilla: 1 fecha de suspensión. Roja directa: 2 fechas. Las rojas se acumulan partido a partido.</p>
      <h4>Duración</h4>
      <p>Dos tiempos de 25 minutos con 5 minutos de entretiempo.</p>
      <h4>Formato</h4>
      <p>Dos zonas de 12 equipos. Los tres primeros de cada zona avanzan a una fase final que define los puestos 1° al 6°.</p>
      <h4>Reglas de juego</h4>
      <p>El arquero no puede tomar la pelota con las manos en un pase lateral propio ni en un retroceso de un defensor.</p>
      <h4>Cambios</h4>
      <p>Rotativos o limitados, según lo que acuerden los delegados antes de cada partido.</p>
      <h4>Desempates</h4>
      <p>Si en la fase de grupos dos equipos terminan igualados en puntos, se juega un partido de desempate.</p>
      <h4>Tolerancia</h4>
      <p>Hay un margen de 10 minutos de tolerancia únicamente para el primer partido del campeonato.</p>
      <h4>Conducta</h4>
      <p>Se exige respeto hacia el árbitro, los rivales y la organización. La conducta violenta puede derivar en expulsión.</p>
      <h4>Premiación</h4>
      <p>Se reconoce al campeón y al subcampeón del torneo.</p>
      <h4>Puntaje y retiros (agregado)</h4>
      <p>Victoria 2 puntos, empate 1 punto, derrota 0. Si un equipo se retira del campeonato, los partidos pendientes contra ese equipo se dan por ganados (W.O.) a su rival, que recibe los 2 puntos correspondientes; los partidos ya jugados no se modifican.</p>
    </div>
  `;
}

const TORNEO_URL = 'https://ejecucionenredvial-afk.github.io/cristina-libre';

function compartirLink(){
  if(navigator.share){
    navigator.share({
      title: 'Cristina Libre · Fixture y Posiciones',
      text: '¡Mirá el fixture del Torneo Cristina Libre en vivo!',
      url: TORNEO_URL
    }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(TORNEO_URL).then(()=>{
      alert('Link copiado: ' + TORNEO_URL);
    }).catch(()=>{ alert('Link: ' + TORNEO_URL); });
  }
}

function renderCompartir(){
  const shareBtn = `
    <div class="card" style="margin-bottom:14px;">
      <p style="color:var(--chalk-dim);font-size:14px;line-height:1.6;margin:0 0 14px;">
        Mandá el link del torneo a jugadores, delegados o el grupo de WhatsApp. Cualquiera puede ver el fixture y las posiciones en tiempo real, sin necesidad de descargar nada.
      </p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <button class="action" onclick="compartirLink()" style="font-size:14px;padding:12px 24px;">
          📤 Compartir link del torneo
        </button>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--chalk-faint);word-break:break-all;">
          ${TORNEO_URL}
        </div>
      </div>
    </div>`;

  if(usingLive){
    if(isEditor){
      return `
        <h2 class="sectiontitle">Compartir <span class="tag">Modo en vivo</span></h2>
        ${shareBtn}
        <div class="card">
          <p style="color:var(--chalk-dim); font-size:14px; line-height:1.6; margin:0 0 14px;">
            Estás conectado como editor (<strong>${EDITOR_EMAIL}</strong>). Tus cambios se ven al instante en todos los dispositivos.
          </p>
          <button class="action ghost" onclick="editorLogout()">Cerrar sesión de editor</button>
        </div>
      `;
    }
    return `
      <h2 class="sectiontitle">Compartir <span class="tag">Modo en vivo</span></h2>
      ${shareBtn}
      <div class="card">
        <p style="color:var(--chalk-dim); font-size:14px; line-height:1.6; margin:0 0 14px;">
          Para cargar resultados y horarios, iniciá sesión como editor.
        </p>
        <button class="action" onclick="showLoginOverlay()">🔐 Iniciar sesión como editor</button>
      </div>
    `;
  }
  return `
    <h2 class="sectiontitle">Compartir <span class="tag">Modo en vivo</span></h2>
    ${shareBtn}
    <div class="card">
      <p style="color:var(--chalk-dim); font-size:14px; line-height:1.6; margin:0 0 14px;">
        Para cargar resultados y horarios, iniciá sesión como editor.
      </p>
      <button class="action" onclick="showLoginOverlay()" style="margin-bottom:10px;">🔐 Iniciar sesión como editor</button>
      <p style="color:var(--chalk-faint);font-size:12px;margin:0;">Para que el login funcione tenés que abrir el torneo desde el link de GitHub, no desde un archivo guardado.</p>
    </div>
  `;
}

function showLoginOverlay(){
  const existing = document.getElementById('loginOverlay');
  if(existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'loginOverlay';
  overlay.innerHTML = `
    <div class="login-overlay">
      <div class="login-box">
        <h2 style="font-family:'Oswald',sans-serif;color:var(--green);margin:0 0 6px;font-size:20px;">Acceso editor</h2>
        <p style="color:var(--chalk-dim);font-size:13px;margin:0 0 20px;">Solo el organizador puede editar resultados.</p>
        <input type="email" id="ovEmail" placeholder="Tu email" autocomplete="username" inputmode="email">
        <input type="password" id="ovPass" placeholder="Contraseña" autocomplete="current-password">
        <button id="ovBtn" class="action" onclick="doOverlayLogin()">Entrar</button>
        <p class="loginerr" id="ovErr"></p>
        <button class="action ghost" style="margin-top:4px;" onclick="document.getElementById('loginOverlay').remove()">Cancelar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(()=>{ const el=document.getElementById('ovEmail'); if(el) el.focus(); }, 100);
}

function doOverlayLogin(){
  const email = (document.getElementById('ovEmail')||{}).value || '';
  const pass = (document.getElementById('ovPass')||{}).value || '';
  const errEl = document.getElementById('ovErr');
  const btnEl = document.getElementById('ovBtn');
  if(!email.trim() || !pass){ if(errEl) errEl.textContent = 'Completá email y contraseña.'; return; }
  if(errEl) errEl.textContent = '';
  if(btnEl){ btnEl.disabled = true; btnEl.textContent = 'Ingresando…'; }
  auth.signInWithEmailAndPassword(email.trim(), pass)
    .then(()=>{ const ov=document.getElementById('loginOverlay'); if(ov) ov.remove(); })
    .catch(err=>{
      if(btnEl){ btnEl.disabled = false; btnEl.textContent = 'Entrar'; }
      const msg = err && err.code === 'auth/wrong-password' ? 'Contraseña incorrecta.'
        : err && err.code === 'auth/user-not-found' ? 'Email no encontrado.'
        : err && err.code === 'auth/network-request-failed' ? 'Sin conexión.'
        : 'Error: ' + (err && err.message ? err.message : '');
      if(errEl) errEl.textContent = msg;
    });
}

function renderHeaderMeta(){
  let subtitle = '20 equipos · 2 zonas';
  if(usingLive){
    const badge = liveStatus !== 'online'
      ? '<span class="lockbadge">🟡 Conectando…</span>'
      : isEditor
        ? '<span class="lockbadge live">✏️ Editor</span>'
        : '<span class="lockbadge live">🟢 En vivo</span>';
    subtitle += ' ' + badge;
  } else {
    subtitle += VIEW_ONLY ? ' <span class="lockbadge">🔒 Solo lectura</span>' : ' · fixture 2026';
  }
  document.getElementById('subtitle').innerHTML = subtitle;

  let footer;
  if(usingLive){
    footer = isEditor
      ? 'Estás editando en vivo: cualquier cambio que hagas se ve al instante en todas las copias de este archivo que estén abiertas. Pestaña "Compartir" para cerrar tu sesión de editor.'
      : 'Estás viendo el torneo en vivo. Los resultados y horarios los actualiza quien organiza — esta vista se refresca sola, no hace falta recargar nada. Pestaña "Compartir" para iniciar sesión si sos el organizador.';
  } else {
    footer = VIEW_ONLY
      ? 'Estás viendo una copia de solo lectura, con los datos al momento en que se generó. No vas a poder cambiar resultados, horarios ni retiros desde aquí — para eso pedile el archivo original a quien organiza el torneo.'
      : 'Datos de ejemplo con equipos ficticios, guardados en este navegador (localStorage). Edita cualquier marcador tocando los casilleros del fixture — las tablas se recalculan solas. Botón "Reiniciar demo" en Equipos para volver al estado inicial, y pestaña "Compartir" para mandar una copia de solo lectura.';
  }
  document.getElementById('footerNote').innerHTML = footer;
}

function renderAll(){
  if(!state){
    document.getElementById('subtitle').innerHTML = '20 equipos · 2 zonas <span class="lockbadge">🟡 Conectando…</span>';
    document.getElementById('headstats').innerHTML = '';
    document.getElementById('footerNote').innerHTML = '';
    document.getElementById('content').innerHTML = '<div class="card empty"><p>Conectando con el torneo en vivo…</p></div>';
    return;
  }
  renderHeaderMeta();
  renderRail();
  renderHeadstats();
  if(loginPending) return; // no borrar el formulario mientras está ingresando
  const content = document.getElementById('content');
  if(activeTab==='fixture') content.innerHTML = renderFixture();
  else if(activeTab==='posiciones') content.innerHTML = renderPosiciones();
  else if(activeTab==='equipos') content.innerHTML = renderEquipos();
  else if(activeTab==='final') content.innerHTML = renderFinal();
  else if(activeTab==='reglamento') content.innerHTML = renderReglamento();
  else if(activeTab==='compartir') content.innerHTML = renderCompartir();

  content.querySelectorAll('.zonebtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ activeZone = btn.dataset.zone; renderAll(); });
  });
}

startApp();
</script>
</body>
</html>
